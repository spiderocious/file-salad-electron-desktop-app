<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      connect-src is open because this desktop app talks to the FileSalad
      backend (any configured host) and uploads directly to arbitrary
      user-supplied BYOK buckets (S3/R2/Tigris/GCS) whose endpoints aren't known
      ahead of time. img-src is permissive so presigned previews from any bucket
      can render. ws: covers Vite HMR in dev. Scripts/styles stay locked down.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src * 'self' http: https: ws: wss: data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:;"
    />
    <title>FileSalad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
